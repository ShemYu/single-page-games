<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Crystal Vanguard Phaser Sprite Proof</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #071014;
      color: #edf6d6;
      font-family: ui-monospace, "SFMono-Regular", "Noto Sans Mono CJK TC", monospace;
      overflow: hidden;
    }

    #game {
      position: fixed;
      inset: 0;
    }

    .hud {
      position: fixed;
      left: 14px;
      top: 14px;
      z-index: 2;
      display: grid;
      gap: 7px;
      max-width: min(520px, calc(100vw - 28px));
      pointer-events: none;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      pointer-events: auto;
    }

    .hud-row {
      width: fit-content;
      padding: 7px 10px;
      background: rgba(9, 16, 20, .82);
      border: 1px solid #62746c;
      box-shadow: 3px 3px 0 rgba(0,0,0,.38);
      font-size: 12px;
      line-height: 1.45;
    }

    .hud-row b {
      color: #fff5c8;
    }

    .hud-row span {
      color: #9de8d7;
    }

    .action-btn {
      min-height: 30px;
      padding: 6px 9px;
      border: 1px solid #62746c;
      border-radius: 0;
      color: #edf6d6;
      background: rgba(22, 34, 41, .9);
      box-shadow: 2px 2px 0 rgba(0,0,0,.38);
      font: inherit;
      font-size: 11px;
      cursor: pointer;
    }

    .action-btn.active {
      color: #071014;
      background: #9de8d7;
      border-color: #d8fff2;
    }
  </style>
</head>
<body>
  <div id="game"></div>
  <div class="hud">
    <div class="hud-row"><b>Phaser 多動作驗證</b> · 直接使用 <span>blade-rank1-*.png</span></div>
    <div class="hud-row">WASD / 方向鍵移動 · 指標點擊移動 · 相機 follow · runtime slash trail · 1-6 切動作</div>
    <div class="controls" id="controls">
      <button class="action-btn" data-action="idle">1 Idle</button>
      <button class="action-btn" data-action="walk">2 Walk</button>
      <button class="action-btn" data-action="attack">3 Attack</button>
      <button class="action-btn" data-action="cast">4 Cast</button>
      <button class="action-btn" data-action="hurt">5 Hurt</button>
      <button class="action-btn" data-action="death">6 Death</button>
    </div>
    <div class="hud-row" id="status">loading...</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
  <script>
  (() => {
    'use strict';

    const WORLD = { width: 1680, height: 1240 };
    const CELL = 96;
    const SPEED = 190;
    const ACTIONS = {
      idle: { texture: 'blade-idle', file: '../../assets/units/blade-rank1-idle.png', frames: 6, fps: 6, repeat: -1 },
      walk: { texture: 'blade-walk', file: '../../assets/units/blade-rank1-walk.png', frames: 8, fps: 9, repeat: -1 },
      attack: { texture: 'blade-attack', file: '../../assets/units/blade-rank1-attack.png', frames: 8, fps: 12, repeat: 0, lock: true },
      cast: { texture: 'blade-cast', file: '../../assets/units/blade-rank1-cast.png', frames: 8, fps: 10, repeat: 0, lock: true },
      hurt: { texture: 'blade-hurt', file: '../../assets/units/blade-rank1-hurt.png', frames: 4, fps: 9, repeat: 0, lock: true },
      death: { texture: 'blade-death', file: '../../assets/units/blade-rank1-death.png', frames: 8, fps: 9, repeat: 0, lock: true, hold: true }
    };
    const DIRS = [
      { key: 'E', angle: 0, row: 2 },
      { key: 'SE', angle: Math.PI / 4, row: 1 },
      { key: 'S', angle: Math.PI / 2, row: 0 },
      { key: 'SW', angle: Math.PI * 3 / 4, row: 7 },
      { key: 'W', angle: Math.PI, row: 6 },
      { key: 'NW', angle: -Math.PI * 3 / 4, row: 5 },
      { key: 'N', angle: -Math.PI / 2, row: 4 },
      { key: 'NE', angle: -Math.PI / 4, row: 3 }
    ];

    const status = document.querySelector('#status');
    const controls = document.querySelector('#controls');

    function directionFromVector(dx, dy) {
      if (Math.hypot(dx, dy) < .01) return 'S';
      const index = Math.round(Math.atan2(dy, dx) / (Math.PI / 4) + 8) % 8;
      return ['E', 'SE', 'S', 'SW', 'W', 'NW', 'N', 'NE'][index];
    }

    class ProofScene extends Phaser.Scene {
      constructor() {
        super('proof');
        this.target = null;
        this.currentDir = 'S';
        this.currentAction = 'idle';
        this.activeAnimKey = '';
        this.lockedAction = null;
        this.deathHold = false;
      }

      preload() {
        for (const action of Object.values(ACTIONS)) {
          this.load.spritesheet(action.texture, action.file, {
            frameWidth: CELL,
            frameHeight: CELL
          });
        }
      }

      create() {
        this.createMap();
        this.createAnimations();

        this.player = this.physics.add.sprite(WORLD.width / 2, WORLD.height / 2, 'blade-idle', 0);
        this.player.setDepth(20);
        this.player.body.setSize(30, 32);
        this.player.body.setOffset(33, 54);

        this.crystal = this.add.polygon(WORLD.width / 2, WORLD.height / 2 + 110, [0,-48, 34,-18, 24,36, 0,52, -24,36, -34,-18], 0x79e7d5);
        this.crystal.setStrokeStyle(3, 0xd6fff1, .9);
        this.crystal.setDepth(10);

        this.cameras.main.setBounds(0, 0, WORLD.width, WORLD.height);
        this.cameras.main.startFollow(this.player, true, .08, .08);
        this.cameras.main.setZoom(1);
        this.physics.world.setBounds(0, 0, WORLD.width, WORLD.height);

        this.cursors = this.input.keyboard.createCursorKeys();
        this.keys = this.input.keyboard.addKeys('W,A,S,D');
        this.actionKeys = this.input.keyboard.addKeys({
          one: Phaser.Input.Keyboard.KeyCodes.ONE,
          two: Phaser.Input.Keyboard.KeyCodes.TWO,
          three: Phaser.Input.Keyboard.KeyCodes.THREE,
          four: Phaser.Input.Keyboard.KeyCodes.FOUR,
          five: Phaser.Input.Keyboard.KeyCodes.FIVE,
          six: Phaser.Input.Keyboard.KeyCodes.SIX
        });
        this.input.on('pointerdown', pointer => {
          if (this.lockedAction || this.deathHold) return;
          this.target = { x: pointer.worldX, y: pointer.worldY };
        });
        this.player.on(Phaser.Animations.Events.ANIMATION_COMPLETE, () => {
          const action = ACTIONS[this.lockedAction];
          if (!action) return;
          if (action.hold) {
            this.player.setFrame(this.rowForDir(this.currentDir) * action.frames + action.frames - 1);
            this.deathHold = true;
            this.refreshStatus();
          } else {
            this.lockedAction = null;
            this.playAction('idle');
          }
        });

        controls.addEventListener('click', event => {
          const button = event.target.closest('[data-action]');
          if (button) this.playAction(button.dataset.action, true);
        });

        this.playAction('idle');
        status.textContent = 'loaded: idle / walk / attack / cast / hurt / death';
      }

      createAnimations() {
        for (const [actionKey, action] of Object.entries(ACTIONS)) {
          for (const dir of DIRS) {
            this.anims.create({
              key: `${actionKey}-${dir.key}`,
              frames: this.anims.generateFrameNumbers(action.texture, {
                start: dir.row * action.frames,
                end: dir.row * action.frames + action.frames - 1
              }),
              frameRate: action.fps,
              repeat: action.repeat
            });
          }
        }
      }

      rowForDir(dirKey) {
        return DIRS.find(d => d.key === dirKey)?.row || 0;
      }

      playAction(actionKey, manual = false) {
        const action = ACTIONS[actionKey];
        if (!action) return;
        if (!manual && this.lockedAction) return;
        if (manual) {
          this.deathHold = false;
          this.lockedAction = null;
        }
        if (manual && actionKey === 'walk') {
          this.deathHold = false;
          this.lockedAction = null;
          this.currentDir = 'SE';
          this.currentAction = 'walk';
          this.setActiveButton('walk');
          this.player.setTexture(ACTIONS.walk.texture);
          this.player.anims.play('walk-SE', false);
          this.activeAnimKey = 'walk-SE';
          this.target = { x: this.player.x + 180, y: this.player.y + 80 };
          this.refreshStatus();
          return;
        }

        const animKey = `${actionKey}-${this.currentDir}`;
        this.currentAction = actionKey;
        this.setActiveButton(actionKey);
        if (manual || action.lock || this.activeAnimKey !== animKey) {
          this.player.setTexture(action.texture);
          this.player.anims.play(animKey, !(manual || action.lock));
          this.activeAnimKey = animKey;
        }
        if (action.lock) {
          this.lockedAction = actionKey;
          this.target = null;
          this.player.setVelocity(0, 0);
          if (actionKey === 'attack') this.playSlashFx();
        }
        this.refreshStatus();
      }

      refreshStatus() {
        status.textContent = `asset ok · action ${this.currentAction} · dir ${this.currentDir} · x ${Math.round(this.player.x)} y ${Math.round(this.player.y)}`;
      }

      playSlashFx() {
        const dir = this.currentDir;
        const angle = {
          E: 0, SE: Math.PI / 4, S: Math.PI / 2, SW: Math.PI * 3 / 4,
          W: Math.PI, NW: -Math.PI * 3 / 4, N: -Math.PI / 2, NE: -Math.PI / 4
        }[dir] || Math.PI / 2;
        const dx = Math.cos(angle);
        const dy = Math.sin(angle);

        this.spawnAfterimage(-dx * 10, -dy * 8, 0x9de8d7, .28);
        this.tweens.add({
          targets: this.player,
          x: this.player.x + dx * 14,
          y: this.player.y + dy * 8,
          duration: 70,
          yoyo: true,
          ease: 'Sine.easeOut'
        });

        this.time.delayedCall(70, () => this.spawnSlashArc(angle, 0xfff4c2, 16, .78, 34, -1.05, .85));
        this.time.delayedCall(105, () => this.spawnSlashArc(angle, 0x9de8d7, 10, .48, 43, -.95, .95));
        this.time.delayedCall(135, () => this.spawnAfterimage(-dx * 4, -dy * 3, 0xffffff, .18));
        this.cameras.main.shake(90, .0025);
      }

      spawnAfterimage(offsetX, offsetY, tint, alpha) {
        const ghost = this.add.sprite(this.player.x + offsetX, this.player.y + offsetY, this.player.texture.key, this.player.frame.name);
        ghost.setDepth(this.player.depth - 1);
        ghost.setTint(tint);
        ghost.setAlpha(alpha);
        ghost.setBlendMode(Phaser.BlendModes.ADD);
        this.tweens.add({
          targets: ghost,
          alpha: 0,
          x: ghost.x + offsetX * .8,
          y: ghost.y + offsetY * .8,
          duration: 180,
          ease: 'Quad.easeOut',
          onComplete: () => ghost.destroy()
        });
      }

      spawnSlashArc(angle, color, width, alpha, radius, startOffset, endOffset) {
        const cx = this.player.x + Math.cos(angle) * 23;
        const cy = this.player.y - 28 + Math.sin(angle) * 13;
        const slash = this.add.graphics();
        slash.setDepth(this.player.depth + 2);
        slash.lineStyle(width, color, alpha);
        slash.beginPath();
        slash.arc(cx, cy, radius, angle + startOffset, angle + endOffset, false);
        slash.strokePath();
        slash.lineStyle(Math.max(2, width * .35), 0xffffff, alpha * .75);
        slash.beginPath();
        slash.arc(cx, cy, radius + 5, angle + startOffset * .72, angle + endOffset * .72, false);
        slash.strokePath();
        slash.setBlendMode(Phaser.BlendModes.ADD);
        this.tweens.add({
          targets: slash,
          alpha: 0,
          scaleX: 1.18,
          scaleY: 1.18,
          duration: 190,
          ease: 'Quad.easeOut',
          onComplete: () => slash.destroy()
        });
      }

      setActiveButton(actionKey) {
        document.querySelectorAll('.action-btn').forEach(button => {
          button.classList.toggle('active', button.dataset.action === actionKey);
        });
      }

      createMap() {
        this.add.rectangle(WORLD.width / 2, WORLD.height / 2, WORLD.width, WORLD.height, 0x18342f).setDepth(-20);

        const g = this.add.graphics().setDepth(-15);
        for (let y = 0; y < WORLD.height; y += 32) {
          for (let x = 0; x < WORLD.width; x += 32) {
            const n = (x / 32 * 17 + y / 32 * 31) % 7;
            g.fillStyle(n < 2 ? 0x1d3832 : n < 5 ? 0x203b34 : 0x244038, 1);
            g.fillRect(x, y, 32, 32);
          }
        }

        g.lineStyle(1, 0x8aa68a, .22);
        for (let x = 0; x <= WORLD.width; x += 60) g.lineBetween(x, 0, x, WORLD.height);
        for (let y = 0; y <= WORLD.height; y += 60) g.lineBetween(0, y, WORLD.width, y);

        g.lineStyle(4, 0x071014, .55);
        g.strokeRect(8, 8, WORLD.width - 16, WORLD.height - 16);
      }

      update() {
        this.handleActionKeys();
        if (this.lockedAction || this.deathHold) {
          this.player.setVelocity(0, 0);
          this.refreshStatus();
          return;
        }

        const vx = (this.cursors.right.isDown || this.keys.D.isDown ? 1 : 0) - (this.cursors.left.isDown || this.keys.A.isDown ? 1 : 0);
        const vy = (this.cursors.down.isDown || this.keys.S.isDown ? 1 : 0) - (this.cursors.up.isDown || this.keys.W.isDown ? 1 : 0);
        let dx = vx;
        let dy = vy;

        if (!dx && !dy && this.target) {
          dx = this.target.x - this.player.x;
          dy = this.target.y - this.player.y;
          if (Math.hypot(dx, dy) < 7) {
            this.target = null;
            dx = 0;
            dy = 0;
          }
        } else if (dx || dy) {
          this.target = null;
        }

        const len = Math.hypot(dx, dy);
        if (len > 0) {
          const nx = dx / len;
          const ny = dy / len;
          const dir = directionFromVector(nx, ny);
          this.currentDir = dir;
          this.player.setVelocity(nx * SPEED, ny * SPEED);
          this.playAction('walk');
        } else {
          this.player.setVelocity(0, 0);
          this.playAction('idle');
        }

        this.refreshStatus();
      }

      handleActionKeys() {
        if (Phaser.Input.Keyboard.JustDown(this.actionKeys.one)) this.playAction('idle', true);
        if (Phaser.Input.Keyboard.JustDown(this.actionKeys.two)) this.playAction('walk', true);
        if (Phaser.Input.Keyboard.JustDown(this.actionKeys.three)) this.playAction('attack', true);
        if (Phaser.Input.Keyboard.JustDown(this.actionKeys.four)) this.playAction('cast', true);
        if (Phaser.Input.Keyboard.JustDown(this.actionKeys.five)) this.playAction('hurt', true);
        if (Phaser.Input.Keyboard.JustDown(this.actionKeys.six)) this.playAction('death', true);
      }
    }

    new Phaser.Game({
      type: Phaser.AUTO,
      parent: 'game',
      width: window.innerWidth,
      height: window.innerHeight,
      backgroundColor: '#071014',
      pixelArt: true,
      physics: {
        default: 'arcade',
        arcade: { debug: false }
      },
      scale: {
        mode: Phaser.Scale.RESIZE,
        autoCenter: Phaser.Scale.CENTER_BOTH
      },
      scene: ProofScene
    });
  })();
  </script>
</body>
</html>
